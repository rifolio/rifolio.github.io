server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Content-hashed build assets — safe to cache forever (filename changes on edit)
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Unhashed public assets (logos, favicon, etc.) keep the same filename across
  # edits, so they must revalidate — otherwise browsers serve stale copies.
  location ~* \.(svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
    try_files $uri =404;
    add_header Cache-Control "no-cache";
  }

  # SPA routing — never cache the app shell so new deploys load immediately
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  location = /favicon.ico { access_log off; log_not_found off; }
  location = /robots.txt  { access_log off; log_not_found off; }
}

